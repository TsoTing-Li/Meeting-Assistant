# Local development overrides
# This file is auto-loaded by docker-compose alongside docker-compose.yml
services:
  redis:
    ports:
      - "6379:6379"

  # Mount source code so code changes take effect without rebuilding
  gateway:
    volumes:
      - ./core:/app/core
      - ./services:/app/services
      - ./cli:/app/cli

  task_worker:
    volumes:
      - ./core:/app/core
      - ./services:/app/services

  stt_service:
    volumes:
      - ./core:/app/core
      - ./services/stt_service:/app/services/stt_service
      - ~/.cache/huggingface:/root/.cache/huggingface
